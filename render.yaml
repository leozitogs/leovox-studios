services:
  - type: web
    name: portfolio-digital-flask
    env: python
    plan: free
    buildPacks:
      - node:
          version: 18
      - python:
          version: 3.11
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && cd ../frontend && npm install --legacy-peer-deps && chmod +x node_modules/.bin/vite && npm run build && cp -r dist/* ../backend/src/static/"
    startCommand: "gunicorn --chdir src main:app"